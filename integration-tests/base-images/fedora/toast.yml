image: fedora:45
tasks:
  i_am_root:
    command: touch /i-am-root.txt
  install_su:
    command: |
      set -euxo pipefail
      dnf install -y util-linux
      if [ ! -e /bin/su ]; then
        ln -s /usr/sbin/su /bin/su
      fi
  create_user:
    dependencies:
      - install_su
    command: useradd user --create-home --shell /bin/bash
  greet:
    dependencies:
      - i_am_root
      - create_user
    input_paths:
      - greet.sh
    output_paths:
      - output.txt
    user: user
    command: |
      set -euxo pipefail
      pwd | grep scratch
      whoami | grep user
      ./greet.sh > output.txt
